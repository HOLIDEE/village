<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: transparent !important; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="32" height="32"></canvas>
<script>
  // Rendre l'iframe elle-même transparente
  try {
    if (window.frameElement) {
      window.frameElement.style.backgroundColor = 'transparent';
      window.frameElement.style.background = 'none';
      window.frameElement.setAttribute('allowtransparency', 'true');
      var p = window.frameElement.parentElement;
      while (p && p !== document.documentElement) {
        p.style.backgroundColor = 'transparent';
        p.style.background = 'none';
        p = p.parentElement;
      }
    }
  } catch(e) {}

  var params = new URLSearchParams(window.location.search);
  var tileIndex = parseInt(params.get('tile') || '0', 10);
  var cols = 31;
  var col = tileIndex % cols;
  var row = Math.floor(tileIndex / cols);

  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    var canvas = document.getElementById('c');
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 32, 32);
    ctx.drawImage(img, col * 32, row * 32, 32, 32, 0, 0, 32, 32);
    // Supprimer la couleur magenta (#ff00ff) utilisée comme transparence par Tiled
    var imageData = ctx.getImageData(0, 0, 32, 32);
    var d = imageData.data;
    for (var i = 0; i < d.length; i += 4) {
      if (d[i] === 255 && d[i+1] === 0 && d[i+2] === 255) {
        d[i+3] = 0; // rendre transparent
      }
    }
    ctx.putImageData(imageData, 0, 0);
  };
  img.src = './Easter.png';
</script>
</body>
</html>
