<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classement - Chasse aux Œufs</title>
    
    <style>
        .leaderboard {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            text-align: left;
        }
        .leaderboard li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }
        .leaderboard li:hover {
            transform: scale(1.02);
        }
        .leaderboard li.gold {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 165, 0, 0.15));
            border-color: rgba(255, 215, 0, 0.4);
        }
        .leaderboard li.silver {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.2), rgba(169, 169, 169, 0.15));
            border-color: rgba(192, 192, 192, 0.3);
        }
        .leaderboard li.bronze {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.2), rgba(184, 115, 51, 0.15));
            border-color: rgba(205, 127, 50, 0.3);
        }
        .leaderboard li.me {
            border-color: rgba(33, 150, 243, 0.6);
            background: rgba(33, 150, 243, 0.15);
        }
        .rank {
            font-size: 1.4rem;
            min-width: 40px;
            text-align: center;
        }
        .player-name {
            flex: 1;
            font-size: 1rem;
            padding: 0 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .score {
            font-weight: bold;
            font-size: 1rem;
            color: #ffd54f;
            white-space: nowrap;
        }
        .empty-state {
            padding: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }
        .refresh-btn {
            margin-top: 15px;
            padding: 10px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #ffd54f, #ff9800);
            color: #1a1a2e;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
        }
        .info-text {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 12px;
            font-style: italic;
        }
    </style>
  <link rel="stylesheet" href="../assets/css-c8c9743b.css">
</head>
<body>
    <div class="container">
        <div class="emoji-header">🏆</div>
        <h1>Classement de la Chasse</h1>
        <p>Qui a trouvé le plus d'œufs ?</p>

        <ul class="leaderboard" id="leaderboard">
            <li class="empty-state">Chargement...</li>
        </ul>

        <button class="refresh-btn" id="refreshBtn">🔄 Rafraîchir</button>
        <p class="info-text">Le classement montre les joueurs connectés et proches de vous.</p>
    </div>

    <script src="https://play.workadventu.re/iframe_api.js"></script>
    <script>
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        var myName = 'Moi';
        var entries = [];

        function renderLeaderboard() {
            var list = document.getElementById('leaderboard');
            if (!list) return;
            var rankIcons = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];
            var classes = ['gold', 'silver', 'bronze'];

            if (entries.length === 0) {
                list.innerHTML = '<li class="empty-state">Personne n\'a encore trouv\u00e9 d\'\u0153uf... \u{1F423}</li>';
                return;
            }

            // Trier par score décroissant
            entries.sort(function(a, b) { return b.score - a.score; });

            // Dédupliquer par nom (garder le meilleur score)
            var seen = {};
            var unique = [];
            for (var i = 0; i < entries.length; i++) {
                if (!seen[entries[i].name]) {
                    seen[entries[i].name] = true;
                    unique.push(entries[i]);
                }
            }

            list.innerHTML = unique.map(function(p, i) {
                var rank = rankIcons[i] || ((i + 1) + '.');
                var cls = classes[i] || '';
                var isMe = (p.name === myName);
                if (isMe) cls += ' me';
                var displayName = isMe ? p.name + ' (toi)' : p.name;
                return '<li class="' + cls.trim() + '">' +
                    '<span class="rank">' + rank + '</span>' +
                    '<span class="player-name">' + escapeHtml(displayName) + '</span>' +
                    '<span class="score">' + p.score + '/4 \u{1F95A}</span>' +
                    '</li>';
            }).join('');
        }

        function scanPlayers() {
            entries = [];

            // 1. Mon propre score
            try {
                var myScore = WA.player.state.easterScore;
                myName = WA.player.name || 'Moi';
                if (typeof myScore === 'number' && myScore > 0) {
                    entries.push({ name: myName, score: myScore });
                }
            } catch(e) {
                console.warn('Leaderboard: error reading own score', e);
            }

            // 2. Scores des joueurs proches via WA.players.list()
            try {
                var players = WA.players.list();
                for (var it = players.next(); !it.done; it = players.next()) {
                    var p = it.value;
                    var score = p.state.easterScore;
                    var name = p.state.easterPlayerName || p.name || 'Joueur';
                    if (typeof score === 'number' && score > 0) {
                        entries.push({ name: String(name), score: score });
                    }
                }
            } catch(e) {
                console.warn('Leaderboard: error scanning players', e);
            }

            console.info('Leaderboard: found', entries.length, 'entries');
            renderLeaderboard();
        }

        WA.onInit().then(function() {
            console.info('Leaderboard: init');

            // Configurer le tracking pour pouvoir lister les joueurs
            WA.players.configureTracking({ players: true }).then(function() {
                console.info('Leaderboard: tracking OK');
                scanPlayers();
            }).catch(function(e) {
                console.warn('Leaderboard: configureTracking failed', e);
                // Essayer quand même avec notre propre score
                scanPlayers();
            });

            // Écouter les changements de score en temps réel
            try {
                WA.players.onVariableChange('easterScore').subscribe(function(event) {
                    var score = typeof event.value === 'number' ? event.value : 0;
                    var name = String((event.player.state && event.player.state.easterPlayerName) || event.player.name || 'Joueur');
                    console.info('Leaderboard: score change', name, '=', score);

                    // Mettre à jour ou ajouter
                    var found = false;
                    for (var i = 0; i < entries.length; i++) {
                        if (entries[i].name === name) {
                            entries[i].score = score;
                            found = true;
                            break;
                        }
                    }
                    if (!found && score > 0) {
                        entries.push({ name: name, score: score });
                    }
                    renderLeaderboard();
                });
            } catch(e) {
                console.warn('Leaderboard: onVariableChange failed', e);
            }

            // Quand un joueur entre dans la zone visible
            try {
                WA.players.onPlayerEnters.subscribe(function(player) {
                    var score = player.state && player.state.easterScore;
                    var name = String((player.state && player.state.easterPlayerName) || player.name || 'Joueur');
                    if (typeof score === 'number' && score > 0) {
                        var found = false;
                        for (var i = 0; i < entries.length; i++) {
                            if (entries[i].name === name) {
                                entries[i].score = score;
                                found = true;
                                break;
                            }
                        }
                        if (!found) {
                            entries.push({ name: name, score: score });
                        }
                        renderLeaderboard();
                    }
                });
            } catch(e) {
                console.warn('Leaderboard: onPlayerEnters failed', e);
            }

            // Bouton rafraîchir = rescan complet
            document.getElementById('refreshBtn').addEventListener('click', function() {
                scanPlayers();
            });
        });
    </script>
</body>
</html>
