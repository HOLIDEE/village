<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classement - Chasse aux Œufs</title>
    
    <style>
        .leaderboard {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            text-align: left;
        }
        .leaderboard li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }
        .leaderboard li:hover {
            transform: scale(1.02);
        }
        .leaderboard li.gold {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 165, 0, 0.15));
            border-color: rgba(255, 215, 0, 0.4);
        }
        .leaderboard li.silver {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.2), rgba(169, 169, 169, 0.15));
            border-color: rgba(192, 192, 192, 0.3);
        }
        .leaderboard li.bronze {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.2), rgba(184, 115, 51, 0.15));
            border-color: rgba(205, 127, 50, 0.3);
        }
        .rank {
            font-size: 1.4rem;
            min-width: 40px;
            text-align: center;
        }
        .player-name {
            flex: 1;
            font-size: 1rem;
            padding: 0 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .score {
            font-weight: bold;
            font-size: 1rem;
            color: #ffd54f;
            white-space: nowrap;
        }
        .empty-state {
            padding: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }
        .refresh-btn {
            margin-top: 15px;
            padding: 10px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #ffd54f, #ff9800);
            color: #1a1a2e;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
        }
    </style>
  <script type="module" crossorigin src="../assets/easterLeaderboard-f3d97e6a.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/modulepreload-polyfill-3cfb730f.js">
  <link rel="stylesheet" href="../assets/css-c8c9743b.css">
</head>
<body>
    <div class="container">
        <div class="emoji-header">🏆</div>
        <h1>Classement de la Chasse</h1>
        <p>Qui a trouvé le plus d'œufs ?</p>

        <ul class="leaderboard" id="leaderboard">
            <li class="empty-state">Chargement...</li>
        </ul>

        <button class="refresh-btn" id="refreshBtn">🔄 Rafraîchir</button>
    </div>

    
</body>
</html>
