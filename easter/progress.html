<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progression - Chasse aux Œufs</title>
    
    <style>
        body {
            align-items: flex-start;
            padding: 6px;
            overflow-y: auto;
        }
        .container {
            max-width: 100%;
            padding: 12px 10px;
        }
        .progress-bar-container {
            margin: 10px 0;
        }
        .egg-grid {
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            margin: 10px 0;
        }
        .egg-item {
            width: 100%;
            height: auto;
            min-height: 38px;
            flex-direction: column;
            font-size: 0.85rem;
            gap: 1px;
            padding: 2px 0;
        }
        .egg-number {
            font-size: 0.5rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1;
        }
        .egg-found .egg-number {
            color: rgba(144, 238, 144, 0.85);
        }
        h2 { margin-bottom: 6px; }
        p { margin-bottom: 8px; }
    </style>
  <script type="module" crossorigin src="../assets/easterProgress-0c6119dd.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/modulepreload-polyfill-3cfb730f.js">
  <link rel="stylesheet" href="../assets/css-c8c9743b.css">
</head>
<body>
    <div class="container">
        <div class="emoji-header">📊</div>
        <h2>Ta progression</h2>
        
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
        </div>

        <p id="progressText">Chargement...</p>

        <div class="egg-grid" id="eggGrid"></div>

        <button class="btn btn-close" id="closeButton">Fermer</button>
    </div>

    <script src="https://play.workadventu.re/iframe_api.js"></script>
    
</body>
</html>
