<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teams</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1b1b2f;
            color: #fff;
            overflow: hidden;
        }

        /* Tentative iframe (si Microsoft l'autorise) */
        #teamsFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Fallback si iframe bloquée */
        #fallback {
            display: none;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            gap: 20px;
        }

        .teams-logo {
            font-size: 4rem;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
            max-width: 280px;
        }

        .btn-teams {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #5b5fc7, #4b4fb5);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-teams:hover {
            transform: scale(1.03);
            filter: brightness(1.15);
        }

        .btn-teams-secondary {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-teams-secondary:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .hint {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            margin-top: 8px;
            max-width: 260px;
            line-height: 1.4;
        }

        .quick-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 4px;
            width: 100%;
            max-width: 280px;
        }

        .quick-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .quick-link:hover {
            background: rgba(255,255,255,0.12);
        }
    </style>
</head>
<body>
    <!-- Tentative 1: iframe directe -->
    <iframe id="teamsFrame" src="https://teams.cloud.microsoft/"></iframe>

    <!-- Fallback: panneau de lancement -->
    <div id="fallback">
        <div class="teams-logo">💬</div>
        <h1>Microsoft Teams</h1>
        <p class="subtitle">Teams ne peut pas s'afficher directement ici. Ouvre-le dans une fenêtre dédiée — elle restera à côté de WorkAdventure.</p>

        <button class="btn-teams" id="btnOpenPopup">
            💬 Ouvrir Teams
        </button>

        <div class="quick-links">
            <a class="quick-link" id="linkChat" href="#">
                💬 Chat
            </a>
            <a class="quick-link" id="linkTeams" href="#">
                👥 Équipes & canaux
            </a>
            <a class="quick-link" id="linkCalendar" href="#">
                📅 Calendrier
            </a>
        </div>

        <button class="btn-teams-secondary" id="btnNewTab">
            ↗️ Ouvrir dans un nouvel onglet
        </button>

        <p class="hint">💡 Ta session Microsoft reste connectée — pas besoin de te reconnecter à chaque fois.</p>
    </div>

    <script>
        var TEAMS_BASE = 'https://teams.cloud.microsoft/';
        var TEAMS_CHAT = 'https://teams.cloud.microsoft/v2/#/conversations';
        var TEAMS_TEAMS = 'https://teams.cloud.microsoft/v2/#/teams';
        var TEAMS_CALENDAR = 'https://teams.cloud.microsoft/v2/#/calendar';

        var popupRef = null;

        function openTeamsPopup(url) {
            var w = 420;
            var h = window.screen.availHeight - 100;
            var left = window.screen.availWidth - w - 20;
            var top = 50;

            if (popupRef && !popupRef.closed) {
                popupRef.location.href = url;
                popupRef.focus();
                return;
            }

            popupRef = window.open(
                url,
                'teams-wa-chat',
                'width=' + w + ',height=' + h + ',left=' + left + ',top=' + top + ',resizable=yes,scrollbars=yes,status=no,menubar=no,toolbar=no'
            );

            if (popupRef) {
                popupRef.focus();
            }
        }

        // Détection iframe bloquée
        var frame = document.getElementById('teamsFrame');
        var fallback = document.getElementById('fallback');
        var iframeLoaded = false;

        // Méthode 1 : si l'iframe charge, on la garde
        frame.addEventListener('load', function() {
            // Vérifier si on peut accéder au contenu (même domaine) — si non, c'est bloqué
            try {
                // Tenter d'accéder — si cross-origin ET bloqué, ça donnera un about:blank
                var loc = frame.contentWindow.location.href;
                if (loc === 'about:blank') {
                    showFallback();
                } else {
                    iframeLoaded = true;
                }
            } catch(e) {
                // Cross-origin = probablement chargé correctement (pas bloqué)
                iframeLoaded = true;
            }
        });

        // Méthode 2 : timeout — si rien ne charge en 4s, montrer le fallback
        setTimeout(function() {
            if (!iframeLoaded) {
                showFallback();
            }
        }, 4000);

        // Écouter les erreurs CSP
        frame.addEventListener('error', function() {
            showFallback();
        });

        function showFallback() {
            frame.style.display = 'none';
            fallback.style.display = 'flex';
        }

        // Boutons
        document.getElementById('btnOpenPopup').addEventListener('click', function() {
            openTeamsPopup(TEAMS_BASE);
        });

        document.getElementById('linkChat').addEventListener('click', function(e) {
            e.preventDefault();
            openTeamsPopup(TEAMS_CHAT);
        });

        document.getElementById('linkTeams').addEventListener('click', function(e) {
            e.preventDefault();
            openTeamsPopup(TEAMS_TEAMS);
        });

        document.getElementById('linkCalendar').addEventListener('click', function(e) {
            e.preventDefault();
            openTeamsPopup(TEAMS_CALENDAR);
        });

        document.getElementById('btnNewTab').addEventListener('click', function() {
            window.open(TEAMS_BASE, '_blank');
        });
    </script>
</body>
</html>
